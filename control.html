<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Rampa - TRUPAL</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase.js"></script>
</head>
<body>

  <div class="container">
    <div class="card">

      <div class="header">
        <h2>🚛 Control de Rampa</h2>
        <a href="index.html">← Salir</a>
      </div>

      <div id="mensaje"></div>

      <form onsubmit="return false;">

        <div class="form-group">
          <label>Placa <span class="required">*</span></label>
          <input type="text" id="placa" placeholder="Ejemplo: ABC-123">
        </div>

        <div class="form-group">
          <label>Pedido</label>
          <input type="text" id="pedido" placeholder="Opcional">
        </div>

        <div class="form-group">
          <label>Material <span class="required">*</span></label>
          <input type="text" id="material" placeholder="Ejemplo: Cartón corrugado">
        </div>

        <div class="form-group relative">
          <label>Cliente <span class="required">*</span></label>
          <input type="text" id="busquedaCliente" placeholder="Escribe para buscar cliente..." autocomplete="off">
          <div id="resultados" class="search-results" style="display:none;"></div>
          <div id="clienteSeleccionado" class="selected-client"></div>

          <input type="hidden" id="clienteId">
          <input type="hidden" id="clienteNombre">
        </div>

        <div class="form-group">
          <label>Almacén <span class="required">*</span></label>
          <select id="almacen">
            <option value="">Selecciona...</option>
            <option value="AlmHuachipa8">AlmHuachipa8</option>
            <option value="AlmHuachipa9">AlmHuachipa9</option>
            <option value="AlmHuachipa13">AlmHuachipa13</option>
            <option value="AlmHuachipa15">AlmHuachipa15</option>
          </select>
        </div>

        <div class="form-group">
          <label>Estado</label>
          <select id="estado">
            <option value="en espera">en espera</option>
            <option value="prealistando mercadería">prealistando mercadería</option>
            <option value="cargando unidad">cargando unidad</option>
            <option value="fin de carga">fin de carga</option>
          </select>
        </div>

        <button id="btnGuardar" onclick="guardar()" class="btn-guardar">
          Guardar Registro
        </button>

      </form>

    </div>
  </div>

  <script>
    if (localStorage.getItem('rol_trupal') !== 'control') {
      window.location.href = 'index.html';
    }

    let clientes = [];

    const busquedaInput = document.getElementById('busquedaCliente');
    const resultadosDiv = document.getElementById('resultados');
    const clienteIdInput = document.getElementById('clienteId');
    const clienteNombreInput = document.getElementById('clienteNombre');
    const seleccionadoDiv = document.getElementById('clienteSeleccionado');

    async function cargarClientes() {
      try {
        const { data, error } = await db
          .from('clientes')
          .select('id, nombre')
          .order('nombre', { ascending: true });

        if (error) {
          mostrarMensaje('Error al cargar clientes: ' + error.message, 'error');
          console.error(error);
          return;
        }

        clientes = data || [];
        console.log('Clientes cargados:', clientes);

        if (clientes.length === 0) {
          mostrarMensaje('No hay clientes registrados en Supabase.', 'error');
        }

      } catch (err) {
        mostrarMensaje('Error de conexión con Supabase.', 'error');
        console.error(err);
      }
    }

    cargarClientes();

    busquedaInput.addEventListener('input', function () {
      const texto = this.value.trim().toLowerCase();

      clienteIdInput.value = '';
      clienteNombreInput.value = '';
      seleccionadoDiv.textContent = '';

      if (!texto) {
        resultadosDiv.style.display = 'none';
        resultadosDiv.innerHTML = '';
        return;
      }

      const filtrados = clientes.filter(cliente =>
        cliente.nombre.toLowerCase().includes(texto)
      );

      if (filtrados.length === 0) {
        resultadosDiv.innerHTML = '<div class="search-item">No se encontraron clientes</div>';
        resultadosDiv.style.display = 'block';
        return;
      }

      resultadosDiv.innerHTML = filtrados.map(cliente => {
        const nombreSeguro = cliente.nombre.replace(/'/g, "\\'");
        return `
          <button type="button" class="search-item" onclick="seleccionarCliente('${cliente.id}', '${nombreSeguro}')">
            ${cliente.nombre}
          </button>
        `;
      }).join('');

      resultadosDiv.style.display = 'block';
    });

    function seleccionarCliente(id, nombre) {
      clienteIdInput.value = id;
      clienteNombreInput.value = nombre;
      busquedaInput.value = nombre;
      seleccionadoDiv.textContent = '✓ Cliente seleccionado: ' + nombre;
      resultadosDiv.style.display = 'none';
    }

    async function guardar() {
      const placa = document.getElementById('placa').value.trim().toUpperCase();
      const pedido = document.getElementById('pedido').value.trim();
      const material = document.getElementById('material').value.trim();
      const clienteId = document.getElementById('clienteId').value;
      const clienteNombre = document.getElementById('clienteNombre').value;
      const almacen = document.getElementById('almacen').value;
      const estado = document.getElementById('estado').value;

      if (!placa || !material || !clienteId || !clienteNombre || !almacen) {
        mostrarMensaje('Completa todos los campos obligatorios y selecciona un cliente de la lista.', 'error');
        return;
      }

      const btn = document.getElementById('btnGuardar');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      const { error } = await db
        .from('cargas')
        .insert({
          placa: placa,
          pedido: pedido || null,
          material: material,
          cliente_id: clienteId,
          cliente_nombre: clienteNombre,
          almacen: almacen,
          estado: estado,
          creado_por: 'control_rampa'
        });

      btn.disabled = false;
      btn.textContent = 'Guardar Registro';

      if (error) {
        mostrarMensaje('Error al guardar: ' + error.message, 'error');
        console.error(error);
        return;
      }

      mostrarMensaje('✅ Registro guardado correctamente.', 'ok');
      limpiarFormulario();
    }

    function limpiarFormulario() {
      document.getElementById('placa').value = '';
      document.getElementById('pedido').value = '';
      document.getElementById('material').value = '';
      document.getElementById('clienteId').value = '';
      document.getElementById('clienteNombre').value = '';
      document.getElementById('busquedaCliente').value = '';
      document.getElementById('clienteSeleccionado').textContent = '';
      document.getElementById('almacen').value = '';
      document.getElementById('estado').value = 'en espera';

      resultadosDiv.innerHTML = '';
      resultadosDiv.style.display = 'none';
    }

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById('mensaje');
      div.className = 'mensaje ' + tipo;
      div.textContent = texto;

      if (tipo === 'ok') {
        setTimeout(() => {
          div.className = '';
          div.textContent = '';
        }, 3000);
      }
    }
  </script>

</body>
</html>
